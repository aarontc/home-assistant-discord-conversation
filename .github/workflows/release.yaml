name: Publish GitHub releases

on:
  # The GitLab push mirror pushes each new vX.Y.Z tag to GitHub; an external
  # (SSH deploy-key) push triggers Actions, so the release publishes within the
  # mirror's sync window (~1-5 min) instead of waiting for the throttled
  # schedule below (GitHub heavily delays scheduled runs on low-activity repos).
  push:
    tags:
      - 'v*'
  # Safety net: if a tag push ever fails to trigger, the next scheduled scan
  # still publishes any missing release (the publish step is idempotent).
  # The push trigger above is the normal path, so the schedule only needs to
  # run occasionally; twice a day is enough (GitHub throttles scheduled runs
  # on low-activity repos to roughly once per 75 min regardless).
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Specific tag to (re)publish; leave blank to scan all tags'
        required: false
        type: string
        default: ''
      replace:
        description: 'Overwrite notes when a release already exists (only honored when `tag` is set)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-sync
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo with full history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch -q --tags origin
          git -c advice.detachedHead=false reset -q --hard origin/main

      - name: Publish missing releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINGLE_TAG: ${{ inputs.tag }}
          REPLACE: ${{ inputs.replace || 'false' }}
        run: |
          set -euo pipefail

          if [ -n "${SINGLE_TAG:-}" ]; then
            tags="$SINGLE_TAG"
          else
            tags="$(git tag --list 'v*' --sort=v:refname)"
          fi

          if [ -z "$tags" ]; then
            echo "No tags to process."
            exit 0
          fi

          for TAG in $tags; do
            exists=false
            gh release view "$TAG" >/dev/null 2>&1 && exists=true

            if $exists && { [ -z "${SINGLE_TAG:-}" ] || [ "$REPLACE" != "true" ]; }; then
              echo "Skipping $TAG (release exists; workflow_dispatch with replace=true regenerates)"
              continue
            fi

            prev="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
            range="${prev:+${prev}..}${TAG}"
            subjects="$(git log "$range" --format='%s' \
              | grep -vE '^\(Patch\) release: bump version to ' || true)"

            {
              for sev in Major Minor Patch; do
                entries="$(echo "$subjects" | grep -E "^\(${sev}\) " || true)"
                if [ -n "$entries" ]; then
                  echo "### ${sev}"
                  echo "$entries" | sed -E "s/^\(${sev}\) /- /"
                  echo
                fi
              done

              other="$(echo "$subjects" | grep -vE '^\((Major|Minor|Patch)\) ' || true)"
              if [ -n "$other" ]; then
                echo "### Other"
                echo "$other" | sed 's/^/- /'
                echo
              fi

              if [ -n "$prev" ]; then
                echo "[Compare on GitLab](https://gitlab.idleengineers.com/aaron/home-assistant-discord-conversation/-/compare/${prev}...${TAG})"
              fi
            } > /tmp/notes.md

            flag=""
            case "$TAG" in *-*) flag="--prerelease" ;; esac

            if $exists; then
              gh release edit "$TAG" --notes-file /tmp/notes.md $flag
              echo "Updated release $TAG"
            else
              gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md $flag
              echo "Created release $TAG"
            fi
          done
